<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productivity Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg:#eef2f7;
--card:white;
--text:black;
--button:#1a73e8;
}

body.dark{
--bg:#121212;
--card:#1e1e1e;
--text:#ffffff;
--button:#3a8cff;
}

body{
font-family:Arial;
background:var(--bg);
display:flex;
justify-content:center;
padding:20px;
color:var(--text);
}

.container{
background:var(--card);
padding:25px;
border-radius:10px;
width:380px;
box-shadow:0 6px 20px rgba(0,0,0,0.2);
}

h2{
text-align:center;
}

input, button{
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:var(--button);
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#0c4db3;
}

ul{
list-style:none;
padding:0;
}

li{
background:#f7f7f7;
padding:10px;
margin-top:8px;
border-radius:6px;
display:flex;
justify-content:space-between;
align-items:center;
}

body.dark li{
background:#2b2b2b;
}

.completed{
text-decoration:line-through;
color:gray;
}

.deleteBtn {
  background-color: red;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 4px;
  cursor: pointer;
  font-weight: bold;
}

.deleteBtn:hover {
  background-color: darkred;
}

.toggle{
margin-top:10px;
}

canvas{
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<h2>Productivity Tracker</h2>

<button class="toggle" onclick="toggleDark()">🌙 Toggle Dark Mode</button>

<input id="taskText" placeholder="Enter task">

<input type="date" id="taskDate">

<input type="time" id="taskTime">

<button onclick="addTask()">Add Task</button>

<ul id="taskList"></ul>

<h3>Weekly Performance</h3>

<canvas id="weeklyChart"></canvas>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let weeklyData = JSON.parse(localStorage.getItem("weeklyData")) || [0,0,0,0,0,0,0];

const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const ctx=document.getElementById("weeklyChart");

let chart=new Chart(ctx,{
type:"line",
data:{
labels:days,
datasets:[{
label:"Tasks Completed",
data:weeklyData,
borderColor:"green",
backgroundColor:"rgba(0,200,0,0.1)",
tension:0.3
}]
}
});

function saveTasks(){
localStorage.setItem("tasks",JSON.stringify(tasks));
}

function saveWeekly(){
localStorage.setItem("weeklyData",JSON.stringify(weeklyData));
}

function toggleDark(){
document.body.classList.toggle("dark");
}

function addTask(){

let text=document.getElementById("taskText").value;
let date=document.getElementById("taskDate").value;
let time=document.getElementById("taskTime").value;

if(text=="") return;

let task={text,date,time,completed:false};

tasks.push(task);

saveTasks();

renderTasks();
}

function renderTasks(){

let list=document.getElementById("taskList");

list.innerHTML="";

tasks.forEach((task,index)=>{

let li=document.createElement("li");

let span=document.createElement("span");

span.innerText=task.text+" ("+task.date+" "+task.time+")";

if(task.completed) span.classList.add("completed");

span.onclick=()=>{

task.completed=!task.completed;

let today=new Date().getDay();

if(task.completed){
weeklyData[today] +=1;
}

saveWeekly();

chart.data.datasets[0].data=weeklyData;

chart.update();

saveTasks();

renderTasks();
};

let del = document.createElement("button");
del.innerText = "Delete";
del.className = "deleteBtn";
del.onclick = () => {
tasks.splice(index,1);
saveTasks();
renderTasks();
};
li.appendChild(span);
li.appendChild(del);

list.appendChild(li);

});

}

// Alarm reminder every minute
setInterval(()=>{
let now=new Date();
tasks.forEach(task=>{
let taskTime=new Date(task.date+" "+task.time);
if(now>=taskTime && !task.completed){
alert("Reminder: "+task.text);
}
});
},60000);

renderTasks();

</script>

</body>
</html>
